<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pişik 🐱</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cat-container {
      margin-bottom: 60px;
      transition: all 0.6s ease;
    }

    #cat {
      width: 240px;
      height: 240px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      transition: all 0.6s ease;
    }

    .options {
      display: flex;
      gap: 30px;
      width: 100%;
      max-width: 440px;
      justify-content: center;
      position: relative;
      z-index: 10;
    }

    button {
      padding: 20px 42px;
      font-size: 1.5rem;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 155px;
    }

    #nurane {
      background-color: #ff6b6b;
      color: white;
    }

    #yusuf {
      background-color: #4ecdc4;
      color: white;
      transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:active {
      transform: scale(0.93);
    }

    /* Reset üçün lol şəkli */
    #lolContainer {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('lol.png') center/contain no-repeat;
      background-color: #ffffff;
      z-index: 200;
    }
  </style>
</head>
<body>

  <div class="cat-container">
    <div id="cat"></div>
  </div>

  <div class="options">
    <button id="nurane">Nurane</button>
    <button id="yusuf">YUSUF</button>
  </div>

  <div id="lolContainer"></div>

  <script>
    let wrongCount = 0;
    const maxWrong = 5;

    const cat = document.getElementById('cat');
    const nuraneBtn = document.getElementById('nurane');
    const yusufBtn = document.getElementById('yusuf');
    const lolContainer = document.getElementById('lolContainer');

    // Pişik şəkilləri (sənin göndərdiyin + gülməli dəyişikliklər)
    const catImages = [
      "ohQt2",                                      // 0 - normal
      "https://i.imgur.com/2vN8fKz.jpeg",
      "https://i.imgur.com/9pL3mXb.jpeg",
      "https://i.imgur.com/XkP7qRt.jpeg",
      "https://i.imgur.com/5tR9vLm.jpeg",
      "https://i.imgur.com/Z8kPqWv.jpeg"            // 5 - ən gülməli
    ];

    function updateCat() {
      if (wrongCount < catImages.length) {
        cat.style.backgroundImage = `url('${catImages[wrongCount]}')`;
      }
    }

    function growYusufButton() {
      const scale = 1 + (wrongCount * 0.72);
      yusufBtn.style.transform = `scale(${scale})`;
      yusufBtn.style.minWidth = `${160 + (wrongCount * 55)}px`;
      yusufBtn.style.padding = `${20 + (wrongCount * 10)}px ${42 + (wrongCount * 15)}px`;
      yusufBtn.style.fontSize = `${1.5 + (wrongCount * 0.4)}rem`;
    }

    nuraneBtn.addEventListener('click', () => {
      wrongCount++;

      updateCat();
      growYusufButton();

      if (wrongCount >= maxWrong) {
        // === 5-ci seçim - Tam ekran YUSUF ===
        yusufBtn.style.position = "fixed";
        yusufBtn.style.top = "0";
        yusufBtn.style.left = "0";
        yusufBtn.style.width = "100vw";
        yusufBtn.style.height = "100vh";
        yusufBtn.style.borderRadius = "0";
        yusufBtn.style.fontSize = "5rem";
        yusufBtn.style.zIndex = "100";
        yusufBtn.style.boxShadow = "none";
        yusufBtn.style.display = "flex";
        yusufBtn.style.alignItems = "center";
        yusufBtn.style.justifyContent = "center";

        // Nurane tam yox olur
        nuraneBtn.style.display = "none";

        // Pişik tam yox olur
        cat.style.display = "none";
      }
    });

    // Yusuf seçiləndə ekran sıfırlanır və lol.png gəlir
    yusufBtn.addEventListener('click', () => {
      if (wrongCount >= maxWrong) {
        // Tam ekran YUSUF vəziyyətində basılıbsa
        document.body.style.backgroundColor = "#ffffff";
        cat.style.display = "none";
        nuraneBtn.style.display = "none";
        yusufBtn.style.display = "none";
        lolContainer.style.display = "block";
      } else {
        // Normal vəziyyətdə Yusuf seçiləndə heç nə dəyişmir (istəyirsənsə buraya başqa effekt qoya bilərik)
      }
    });

    // İlk pişik şəklini qoy
    cat.style.backgroundImage = `url('${catImages[0]}')`;
  </script>
</body>
</html>
